aid: neptune-ai
url: https://raw.githubusercontent.com/api-evangelist/neptune-ai/refs/heads/main/apis.yml
name: Neptune.ai
x-type: company
description: >-
  Neptune.ai is an experiment tracker for ML and foundation-model training. As of 2025,
  Neptune.ai is being acquired by OpenAI and the public pricing page redirects to the
  OpenAI announcement. Customers continue to use the Neptune Python client and REST API
  during the transition.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ML
  - MLOps
  - Experiment Tracking
  - Foundation Models
  - Acquired
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: neptune-ai:neptune-rest-api
    name: Neptune.ai REST API
    humanURL: https://docs-legacy.neptune.ai/api/api_reference/
    baseURL: https://app.neptune.ai/api
    tags:
      - REST
      - Runs
      - Projects
      - Metrics
    description: >-
      The Neptune REST API backs the Neptune Python client. It exposes runs, projects,
      fields, and metadata logging. Authentication uses an API token from the user
      profile.
    properties:
      - type: Documentation
        url: https://docs-legacy.neptune.ai/api/api_reference/
      - type: SDK
        title: Python (neptune)
        url: https://docs-legacy.neptune.ai/api/neptune/
  - aid: neptune-ai:neptune-scale-api
    name: Neptune Scale API (foundation-model tier)
    humanURL: https://neptune.ai/docs
    baseURL: https://api.neptune.ai
    tags:
      - REST
      - Foundation Models
      - Scale
    description: >-
      Neptune Scale is the higher-throughput logging surface designed for foundation
      model training jobs. Same API-token authentication; SDK support in `neptune-scale`.
    properties:
      - type: Documentation
        url: https://neptune.ai/docs
